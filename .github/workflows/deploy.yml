name: Scheduled Deploy
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_RUN=$(gh run list \
            --workflow="deploy.yml" \
            --status=success \
            --limit=2 \
            --json updatedAt \
            --jq '.[1].updatedAt // empty')

          if [ -z "$LAST_RUN" ]; then
            echo "First run ever. Deploying."
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git log --oneline --after="$LAST_RUN")
            if [ -z "$COMMITS" ]; then
              echo "No new commits since last run. Skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "New commits found. Deploying."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Trigger DigitalOcean redeploy
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments"
