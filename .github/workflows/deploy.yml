name: Deploy if Repo Updated

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get current commit
        id: current
        run: echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Restore last deployed commit
        id: cache
        uses: actions/cache@v4
        with:
          path: last_commit.txt
          key: ${{ steps.current.outputs.hash }}

      - name: Check if new commit
        run: |
          if [ -f last_commit.txt ]; then
            LAST=$(cat last_commit.txt)
            if [ "$LAST" = "${{ steps.current.outputs.hash }}" ]; then
              echo "No new commit. Skipping deploy."
              exit 0
            fi
          fi

      - name: Save new commit
        run: echo "${{ steps.current.outputs.hash }}" > last_commit.txt

      - name: Trigger DigitalOcean redeploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/712f07e3-b3b5-40c3-85a1-1d6ede5f9d59/deployments"
